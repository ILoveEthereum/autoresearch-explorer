<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <!-- React Flow inspired styles -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f8f8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a192b"/>
      <stop offset="100%" stop-color="#2d2b42"/>
    </linearGradient>
    <linearGradient id="edgeGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b1b1b7"/>
      <stop offset="100%" stop-color="#6e6e76"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#d0d0d0"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b1b1b7"/>
    </marker>
    <marker id="arrowActive" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bgGrad)" rx="12"/>
  <rect width="1200" height="500" fill="url(#dots)" rx="12" opacity="0.5"/>

  <!-- Title area -->
  <text x="600" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a192b" letter-spacing="-0.5">AutoResearch Explorer</text>
  <text x="600" y="64" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6e6e76">Autonomous AI research agent with a live visual canvas</text>

  <!-- === EDGES (drawn first, behind nodes) === -->
  <!-- Question → Research -->
  <path d="M 255 175 C 310 175, 320 145, 375 145" stroke="#b1b1b7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <!-- Question → Plan -->
  <path d="M 255 175 C 310 175, 320 215, 375 215" stroke="#b1b1b7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <!-- Research → Source 1 -->
  <path d="M 555 130 C 600 130, 610 110, 650 110" stroke="#b1b1b7" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <!-- Research → Source 2 -->
  <path d="M 555 145 C 600 145, 610 165, 650 165" stroke="#b1b1b7" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <!-- Plan → Build -->
  <path d="M 555 215 C 610 215, 610 260, 660 260" stroke="#ff6b6b" stroke-width="2" fill="none" marker-end="url(#arrowActive)" stroke-dasharray="6,3">
    <animate attributeName="stroke-dashoffset" from="18" to="0" dur="1s" repeatCount="indefinite"/>
  </path>
  <!-- Build → Code -->
  <path d="M 840 260 C 890 260, 890 230, 930 230" stroke="#b1b1b7" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <!-- Build → Experiment -->
  <path d="M 840 270 C 890 270, 890 310, 930 310" stroke="#b1b1b7" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <!-- Source 1 → Insight -->
  <path d="M 820 110 C 870 110, 870 170, 930 170" stroke="#b1b1b7" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <!-- Watchdog connection (dashed) -->
  <path d="M 600 390 L 600 300 L 750 270" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.7"/>

  <!-- === NODES === -->

  <!-- Node: Your Question (input node - rounded) -->
  <g filter="url(#shadow)">
    <rect x="75" y="145" width="180" height="60" rx="30" fill="url(#nodeGrad1)" stroke="#1a192b" stroke-width="2"/>
    <text x="165" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1a192b">Your Question</text>
    <text x="165" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6e6e76">"Build a BitNet model for M3"</text>
    <!-- Handle right -->
    <circle cx="255" cy="175" r="4" fill="#1a192b"/>
  </g>

  <!-- Node: Research -->
  <g filter="url(#shadow)">
    <rect x="375" y="100" width="180" height="70" rx="8" fill="url(#nodeGrad1)" stroke="#1a192b" stroke-width="1.5"/>
    <rect x="375" y="100" width="180" height="24" rx="8" fill="#1a192b"/>
    <rect x="375" y="116" width="180" height="8" fill="#1a192b"/>
    <text x="385" y="116" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">🔍 Research</text>
    <text x="385" y="142" font-family="system-ui, sans-serif" font-size="9" fill="#6e6e76">Searching papers, docs,</text>
    <text x="385" y="155" font-family="system-ui, sans-serif" font-size="9" fill="#6e6e76">code repositories...</text>
    <!-- Handle left -->
    <circle cx="375" cy="135" r="4" fill="#1a192b"/>
    <!-- Handle right -->
    <circle cx="555" cy="135" r="4" fill="#1a192b"/>
  </g>

  <!-- Node: Plan & Decompose -->
  <g filter="url(#shadow)">
    <rect x="375" y="190" width="180" height="60" rx="8" fill="url(#nodeGrad1)" stroke="#1a192b" stroke-width="1.5"/>
    <rect x="375" y="190" width="180" height="24" rx="8" fill="#2d2b42"/>
    <rect x="375" y="206" width="180" height="8" fill="#2d2b42"/>
    <text x="385" y="207" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">📋 Plan &amp; Decompose</text>
    <text x="385" y="232" font-family="system-ui, sans-serif" font-size="9" fill="#6e6e76">3 sub-tasks identified</text>
    <!-- Handle left -->
    <circle cx="375" cy="215" r="4" fill="#1a192b"/>
    <!-- Handle right -->
    <circle cx="555" cy="215" r="4" fill="#ff6b6b"/>
  </g>

  <!-- Node: Source (arxiv paper) -->
  <g filter="url(#shadow)">
    <rect x="650" y="88" width="170" height="48" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.2"/>
    <text x="660" y="107" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#c2410c">📄 arXiv:2310.11453</text>
    <text x="660" y="123" font-family="system-ui, sans-serif" font-size="8" fill="#9a3412">BitNet: Scaling 1-bit LLMs...</text>
    <circle cx="650" cy="110" r="3" fill="#f97316"/>
    <circle cx="820" cy="110" r="3" fill="#f97316"/>
  </g>

  <!-- Node: Source 2 -->
  <g filter="url(#shadow)">
    <rect x="650" y="148" width="170" height="48" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="660" y="167" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#1d4ed8">🌐 microsoft/BitNet</text>
    <text x="660" y="183" font-family="system-ui, sans-serif" font-size="8" fill="#1e40af">GitHub — reference impl</text>
    <circle cx="650" cy="168" r="3" fill="#3b82f6"/>
  </g>

  <!-- Node: Build (active, pulsing border) -->
  <g filter="url(#shadow)">
    <rect x="660" y="230" width="180" height="70" rx="8" fill="url(#nodeGrad1)" stroke="#ff6b6b" stroke-width="2.5">
      <animate attributeName="stroke-opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="660" y="230" width="180" height="24" rx="8" fill="#ff6b6b"/>
    <rect x="660" y="246" width="180" height="8" fill="#ff6b6b"/>
    <text x="670" y="247" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">⚡ Build</text>
    <text x="670" y="268" font-family="system-ui, sans-serif" font-size="9" fill="#6e6e76">Writing model.py...</text>
    <text x="670" y="281" font-family="system-ui, sans-serif" font-size="9" fill="#6e6e76">Installing torch, numpy</text>
    <!-- Active indicator -->
    <circle cx="830" cy="240" r="5" fill="#ff6b6b">
      <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="660" cy="260" r="4" fill="#ff6b6b"/>
    <circle cx="840" cy="260" r="4" fill="#1a192b"/>
  </g>

  <!-- Node: Code output -->
  <g filter="url(#shadow)">
    <rect x="930" y="205" width="180" height="55" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
    <text x="940" y="224" font-family="monospace" font-size="9" font-weight="600" fill="#15803d">📝 model.py</text>
    <text x="940" y="239" font-family="monospace" font-size="8" fill="#166534">class BitLinear(nn.Module):</text>
    <text x="940" y="251" font-family="monospace" font-size="8" fill="#166534">    def forward(self, x):</text>
    <circle cx="930" cy="230" r="3" fill="#22c55e"/>
  </g>

  <!-- Node: Insight -->
  <g filter="url(#shadow)">
    <rect x="930" y="148" width="180" height="45" rx="6" fill="#faf5ff" stroke="#a855f7" stroke-width="1.2"/>
    <text x="940" y="166" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#7e22ce">💡 Insight</text>
    <text x="940" y="181" font-family="system-ui, sans-serif" font-size="8" fill="#6b21a8">Use ternary weights {-1, 0, 1}</text>
    <circle cx="930" cy="170" r="3" fill="#a855f7"/>
  </g>

  <!-- Node: Experiment result -->
  <g filter="url(#shadow)">
    <rect x="930" y="278" width="180" height="55" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1.2"/>
    <text x="940" y="297" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#a16207">🧪 Experiment</text>
    <text x="940" y="312" font-family="system-ui, sans-serif" font-size="8" fill="#854d0e">Loss: 2.34 → 1.87 (epoch 3)</text>
    <text x="940" y="324" font-family="system-ui, sans-serif" font-size="8" fill="#854d0e">MPS acceleration: ✓ active</text>
    <circle cx="930" cy="310" r="3" fill="#eab308"/>
  </g>

  <!-- Watchdog node -->
  <g filter="url(#shadow)">
    <rect x="490" y="370" width="220" height="55" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="500" y="392" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b45309">🐕 Watchdog</text>
    <text x="500" y="410" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">Progress: ✓ on track  •  Loop 7/∞</text>
  </g>

  <!-- Mini-map style box (bottom right) -->
  <rect x="1050" y="400" width="120" height="75" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1" opacity="0.8"/>
  <rect x="1058" y="408" width="18" height="12" rx="2" fill="#1a192b" opacity="0.3"/>
  <rect x="1082" y="415" width="18" height="12" rx="2" fill="#1a192b" opacity="0.3"/>
  <rect x="1098" y="425" width="18" height="12" rx="2" fill="#ff6b6b" opacity="0.4"/>
  <rect x="1120" y="410" width="18" height="12" rx="2" fill="#1a192b" opacity="0.3"/>
  <rect x="1120" y="430" width="18" height="12" rx="2" fill="#1a192b" opacity="0.3"/>
  <rect x="1070" y="440" width="40" height="25" rx="2" stroke="#3b82f6" stroke-width="1" fill="#3b82f620" opacity="0.6"/>
  <text x="1110" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#999">minimap</text>

  <!-- Zoom controls (bottom left) -->
  <g opacity="0.6">
    <rect x="30" y="420" width="28" height="28" rx="4" fill="#fff" stroke="#d0d0d0" stroke-width="1"/>
    <text x="44" y="439" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#666">+</text>
    <rect x="30" y="452" width="28" height="28" rx="4" fill="#fff" stroke="#d0d0d0" stroke-width="1"/>
    <text x="44" y="471" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#666">−</text>
  </g>
</svg>